<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Flow Tracker V2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #080d0b; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080d0b; }
        ::-webkit-scrollbar-thumb { background: #1a3a2a; border-radius: 10px; }
        * { box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        // الثوابت الخاصة بالمشروع
        const RELAY = "0xf70da97812CB96acDF810712Aa562db8dfA3dbEF".toLowerCase();
        const TOKEN = "0xb29de8455ACd47bb10755a133c54d0E595c6FFFF";
        
        // التعديل الرئيسي هنا ليتوافق مع V2
        const BSC_API_V2 = "https://api.bscscan.com/api/v2";
        const CHAIN_ID = "56"; // شبكة BSC Mainnet

        const fmtAddr = (a) => a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "—";
        const fmt = (n, d = 2) => parseFloat(n).toLocaleString("en-US", { maximumFractionDigits: d });
        const fmtDate = (ts) => new Date(ts * 1000).toLocaleString("ar-EG", { dateStyle: "short", timeStyle: "short" });
        const toAmt = (val, dec = 18) => parseFloat(val) / Math.pow(10, dec);

        function Badge({ color, children }) {
            const colors = {
                green: { bg: "rgba(80,200,120,0.12)", border: "rgba(80,200,120,0.35)", text: "#50c878" },
                red: { bg: "rgba(220,80,80,0.12)", border: "rgba(220,80,80,0.35)", text: "#dc5050" },
                yellow: { bg: "rgba(220,180,50,0.12)", border: "rgba(220,180,50,0.35)", text: "#dcb432" },
                gray: { bg: "rgba(120,140,130,0.12)", border: "rgba(120,140,130,0.25)", text: "#7a8c84" },
            };
            const c = colors[color] || colors.gray;
            return (
                <span style={{
                    background: c.bg, border: `1px solid ${c.border}`, color: c.text,
                    borderRadius: 4, padding: "2px 7px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap"
                }}>{children}</span>
            );
        }

        function Progress({ value, max, color = "#63cab7" }) {
            const pct = Math.min((value / max) * 100, 100);
            return (
                <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 4, height: 6, width: "100%", overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4, transition: "width 0.6s ease" }} />
                </div>
            );
        }

        function App() {
            const [apiKey, setApiKey] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [wallets, setWallets] = useState([]);
            const [summary, setSummary] = useState(null);
            const [tab, setTab] = useState("wallets");
            const [flowData, setFlowData] = useState([]);

            const analyze = useCallback(async () => {
                if (!apiKey.trim()) { setError("أدخل API Key أولاً"); return; }
                setLoading(true); setError(""); setWallets([]); setSummary(null);

                try {
                    // استخدام رابط V2 مع إضافة chainid
                    const res = await fetch(`${BSC_API_V2}?chainid=${CHAIN_ID}&module=account&action=tokentx&contractaddress=${TOKEN}&address=${RELAY}&sort=desc&apikey=${apiKey}`);
                    const data = await res.json();
                    
                    if (data.status !== "1") throw new Error(data.result || "API Error");
                    
                    const allTxs = data.result;
                    const dec = parseInt(allTxs[0]?.tokenDecimal || 18);

                    const outgoing = allTxs.filter(t => t.from.toLowerCase() === RELAY);
                    const walletMap = {};

                    outgoing.forEach(tx => {
                        const addr = tx.to.toLowerCase();
                        if (addr === RELAY) return;
                        if (!walletMap[addr]) walletMap[addr] = {
                            address: tx.to, received: 0, sent: 0,
                            firstBuy: tx.timeStamp, lastActivity: tx.timeStamp
                        };
                        walletMap[addr].received += toAmt(tx.value, dec);
                    });

                    // فحص أداء المحافظ (هل باعوا؟) - لـ 20 محفظة فقط لتوفير الطلبات
                    const topAddrs = Object.keys(walletMap).slice(0, 20);
                    for (const addr of topAddrs) {
                        try {
                            const r2 = await fetch(`${BSC_API_V2}?chainid=${CHAIN_ID}&module=account&action=tokentx&contractaddress=${TOKEN}&address=${addr}&sort=asc&apikey=${apiKey}`);
                            const d2 = await r2.json();
                            if (d2.status === "1") {
                                d2.result.forEach(tx => {
                                    if (tx.from.toLowerCase() === addr.toLowerCase()) {
                                        walletMap[addr].sent += toAmt(tx.value, dec);
                                    }
                                });
                            }
                        } catch (e) {}
                        await new Promise(r => setTimeout(r, 250)); // تأخير لتجنب الحظر
                    }

                    const walletList = Object.values(walletMap).map(w => {
                        const net = w.received - w.sent;
                        const holdPct = w.received > 0 ? (net / w.received) * 100 : 0;
                        let status = holdPct >= 80 ? "holder" : (holdPct >= 5 ? "partial" : "sold");
                        return { ...w, net, holdPct, status };
                    }).sort((a, b) => b.received - a.received);

                    setWallets(walletList);

                    const holders = walletList.filter(w => w.status === "holder").length;
                    const sold = walletList.filter(w => w.status === "sold").length;
                    const totalHeld = walletList.reduce((s, w) => s + Math.max(0, w.net), 0);
                    const totalRec = walletList.reduce((s, w) => s + w.received, 0);

                    setSummary({
                        total: walletList.length,
                        holders, sold,
                        holdRate: totalRec > 0 ? (totalHeld / totalRec) * 100 : 0
                    });

                    setFlowData(walletList.slice(0, 15));

                } catch (e) {
                    setError("خطأ في البيانات: " + e.message);
                } finally {
                    setLoading(false);
                }
            }, [apiKey]);

            return (
                <div style={{ minHeight: "100vh", color: "#b8cdc8", fontFamily: "sans-serif", padding: 20 }}>
                    <header style={{ marginBottom: 24, borderBottom: "1px solid #112018", paddingBottom: 15 }}>
                        <div style={{ fontSize: 18, fontWeight: "bold", color: "#63cab7" }}>🔎 TOKEN FLOW TRACKER <span style={{fontSize: 10, verticalAlign: "middle", opacity: 0.5}}>V2</span></div>
                        <div style={{ fontSize: 11, color: "#3a6a58" }}>تتبع حركة السيولة من محفظة الـ Relay للمشترين</div>
                    </header>

                    <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                        <input
                            value={apiKey}
                            onChange={e => setApiKey(e.target.value)}
                            placeholder="BscScan API Key V2..."
                            style={{ flex: 1, background: "#111", border: "1px solid #1a3a2a", borderRadius: 8, padding: 12, color: "#fff", outline: "none" }}
                        />
                        <button onClick={analyze} disabled={loading} style={{ background: "#1a5c4a", border: "none", borderRadius: 8, padding: "0 20px", color: "#63cab7", cursor: "pointer", fontWeight: "bold" }}>
                            {loading ? "جاري العمل..." : "تحليل"}
                        </button>
                    </div>

                    {error && <div style={{ color: "#ff6b6b", background: "rgba(255,0,0,0.1)", padding: 10, borderRadius: 8, marginBottom: 20 }}>{error}</div>}

                    {summary && (
                        <div style={{ marginBottom: 20 }}>
                            <div style={{ display: "flex", gap: 10, marginBottom: 15 }}>
                                <div style={{ flex: 1, background: "#111", padding: 15, borderRadius: 10, textAlign: "center", border: "1px solid #112018" }}>
                                    <div style={{ fontSize: 20, color: "#63cab7" }}>{summary.total}</div>
                                    <div style={{ fontSize: 10 }}>مشترين</div>
                                </div>
                                <div style={{ flex: 1, background: "#111", padding: 15, borderRadius: 10, textAlign: "center", border: "1px solid #112018" }}>
                                    <div style={{ fontSize: 20, color: "#50c878" }}>{summary.holders}</div>
                                    <div style={{ fontSize: 10 }}>محتفظين</div>
                                </div>
                            </div>
                            <div style={{ background: "#111", padding: 15, borderRadius: 10, border: "1px solid #112018" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
                                    <span>معدل الثبات</span>
                                    <span>{fmt(summary.holdRate)}%</span>
                                </div>
                                <Progress value={summary.holdRate} max={100} color={summary.holdRate > 50 ? "#50c878" : "#dc5050"} />
                            </div>
                        </div>
                    )}

                    {wallets.length > 0 && (
                        <div style={{ background: "#0a110e", borderRadius: 12, border: "1px solid #112018", overflow: "hidden" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, textAlign: "right" }}>
                                <thead style={{ background: "#112018", color: "#63cab7" }}>
                                    <tr>
                                        <th style={{ padding: 12 }}>المحفظة</th>
                                        <th style={{ padding: 12 }}>الكمية</th>
                                        <th style={{ padding: 12 }}>الحالة</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {wallets.map(w => (
                                        <tr key={w.address} style={{ borderBottom: "1px solid #112018" }}>
                                            <td style={{ padding: 12 }}><a href={`https://bscscan.com/address/${w.address}`} target="_blank" style={{ color: "#3a8a72", textDecoration: "none" }}>{fmtAddr(w.address)}</a></td>
                                            <td style={{ padding: 12 }}>{fmt(w.received, 0)}</td>
                                            <td style={{ padding: 12 }}>
                                                <Badge color={w.status === "holder" ? "green" : (w.status === "partial" ? "yellow" : "red")}>
                                                    {w.status === "holder" ? "ثبات" : (w.status === "partial" ? "بيع جزئي" : "خرج")}
                                                </Badge>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                    
                    {!loading && wallets.length === 0 && (
                        <div style={{ textAlign: "center", marginTop: 50, opacity: 0.3 }}>
                            <span style={{ fontSize: 40 }}>🌊</span>
                            <p>أدخل مفتاح الـ API للتحليل</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
