<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Flow Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #080d0b; }
        /* تحسين مظهر شريط التمرير ليتناسب مع التصميم المظلم */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080d0b; }
        ::-webkit-scrollbar-thumb { background: #1a3a2a; borderRadius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        const RELAY = "0xf70da97812CB96acDF810712Aa562db8dfA3dbEF".toLowerCase();
        const TOKEN = "0xb29de8455ACd47bb10755a133c54d0E595c6FFFF";
        const BSC_API = "https://api.bscscan.com/api";

        const fmtAddr = (a) => a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "—";
        const fmt = (n, d = 2) => parseFloat(n).toLocaleString("en-US", { maximumFractionDigits: d });
        const fmtDate = (ts) => new Date(ts * 1000).toLocaleString("ar-EG", { dateStyle: "short", timeStyle: "short" });
        const toAmt = (val, dec = 18) => parseFloat(val) / Math.pow(10, dec);

        function Badge({ color, children }) {
            const colors = {
                green: { bg: "rgba(80,200,120,0.12)", border: "rgba(80,200,120,0.35)", text: "#50c878" },
                red: { bg: "rgba(220,80,80,0.12)", border: "rgba(220,80,80,0.35)", text: "#dc5050" },
                yellow: { bg: "rgba(220,180,50,0.12)", border: "rgba(220,180,50,0.35)", text: "#dcb432" },
                blue: { bg: "rgba(80,150,220,0.12)", border: "rgba(80,150,220,0.35)", text: "#5096dc" },
                gray: { bg: "rgba(120,140,130,0.12)", border: "rgba(120,140,130,0.25)", text: "#7a8c84" },
            };
            const c = colors[color] || colors.gray;
            return (
                <span style={{
                    background: c.bg, border: `1px solid ${c.border}`, color: c.text,
                    borderRadius: 4, padding: "2px 7px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap"
                }}>{children}</span>
            );
        }

        function Progress({ value, max, color = "#63cab7" }) {
            const pct = Math.min((value / max) * 100, 100);
            return (
                <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 4, height: 6, width: "100%", overflow: "hidden" }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 4, transition: "width 0.6s ease" }} />
                </div>
            );
        }

        function App() {
            const [apiKey, setApiKey] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [wallets, setWallets] = useState([]);
            const [decimals, setDecimals] = useState(18);
            const [summary, setSummary] = useState(null);
            const [tab, setTab] = useState("wallets");
            const [flowData, setFlowData] = useState([]);

            const analyze = useCallback(async () => {
                if (!apiKey.trim()) { setError("أدخل API Key أولاً"); return; }
                setLoading(true); setError(""); setWallets([]); setSummary(null); setFlowData([]);

                try {
                    const res = await fetch(`${BSC_API}?module=account&action=tokentx&contractaddress=${TOKEN}&address=${RELAY}&sort=desc&apikey=${apiKey}`);
                    const data = await res.json();
                    if (data.status !== "1") throw new Error(data.result || "API Error");
                    const allTxs = data.result;
                    const dec = parseInt(allTxs[0]?.tokenDecimal || 18);
                    setDecimals(dec);

                    const outgoing = allTxs.filter(t => t.from.toLowerCase() === RELAY);
                    const walletMap = {};

                    outgoing.forEach(tx => {
                        const addr = tx.to.toLowerCase();
                        if (addr === RELAY) return;
                        if (!walletMap[addr]) walletMap[addr] = {
                            address: tx.to, received: 0, sent: 0, txCount: 0,
                            firstBuy: tx.timeStamp, lastActivity: tx.timeStamp, txs: []
                        };
                        walletMap[addr].received += toAmt(tx.value, dec);
                        walletMap[addr].txCount++;
                        if (parseInt(tx.timeStamp) < parseInt(walletMap[addr].firstBuy)) walletMap[addr].firstBuy = tx.timeStamp;
                        if (parseInt(tx.timeStamp) > parseInt(walletMap[addr].lastActivity)) walletMap[addr].lastActivity = tx.timeStamp;
                        walletMap[addr].txs.push({ ...tx, dir: "received" });
                    });

                    const topAddrs = Object.keys(walletMap).slice(0, 30);
                    for (const addr of topAddrs) {
                        try {
                            const r2 = await fetch(`${BSC_API}?module=account&action=tokentx&contractaddress=${TOKEN}&address=${addr}&sort=asc&apikey=${apiKey}`);
                            const d2 = await r2.json();
                            if (d2.status === "1") {
                                d2.result.forEach(tx => {
                                    if (tx.from.toLowerCase() === addr.toLowerCase()) {
                                        walletMap[addr].sent += toAmt(tx.value, dec);
                                    }
                                });
                            }
                        } catch {}
                        await new Promise(r => setTimeout(r, 220)); 
                    }

                    const walletList = Object.values(walletMap).map(w => {
                        const net = w.received - w.sent;
                        const holdPct = w.received > 0 ? (net / w.received) * 100 : 0;
                        let status;
                        if (holdPct >= 80) status = "holder";
                        else if (holdPct >= 30) status = "partial";
                        else if (holdPct < 5) status = "sold";
                        else status = "partial";
                        return { ...w, net, holdPct, status };
                    }).sort((a, b) => b.received - a.received);

                    setWallets(walletList);

                    const holders = walletList.filter(w => w.status === "holder").length;
                    const sold = walletList.filter(w => w.status === "sold").length;
                    const partial = walletList.filter(w => w.status === "partial").length;
                    const totalReceived = walletList.reduce((s, w) => s + w.received, 0);
                    const totalHeld = walletList.reduce((s, w) => s + Math.max(0, w.net), 0);

                    setSummary({
                        total: walletList.length,
                        holders, sold, partial,
                        totalReceived, totalHeld,
                        holdRate: totalReceived > 0 ? (totalHeld / totalReceived) * 100 : 0
                    });

                    setFlowData(walletList.slice(0, 20));

                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }, [apiKey]);

            const statusColor = { holder: "green", partial: "yellow", sold: "red" };
            const statusLabel = { holder: "🔒 يحتفظ", partial: "⚖ جزئي", sold: "💸 باع الكل" };

            return (
                <div style={{
                    minHeight: "100vh", background: "#080d0b",
                    color: "#b8cdc8", fontFamily: "sans-serif", padding: 20,
                }}>
                    <div style={{ marginBottom: 24, borderBottom: "1px solid #112018", paddingBottom: 18 }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: "#63cab7", letterSpacing: 2, marginBottom: 4 }}>
                            🔎 TOKEN FLOW TRACKER
                        </div>
                        <div style={{ fontSize: 10, color: "#2a4a40" }}>
                            أين تذهب كل عملية شراء؟ — تتبع المشترين الحقيقيين
                        </div>
                    </div>

                    <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                        <input
                            value={apiKey}
                            onChange={e => setApiKey(e.target.value)}
                            onKeyDown={e => e.key === "Enter" && analyze()}
                            placeholder="BscScan API Key..."
                            style={{
                                flex: 1, background: "rgba(255,255,255,0.04)",
                                border: "1px solid #1a3a2a", borderRadius: 8,
                                padding: "10px 14px", color: "#b8cdc8",
                                fontSize: 13, outline: "none",
                            }}
                        />
                        <button onClick={analyze} disabled={loading} style={{
                            background: loading ? "#0e2018" : "linear-gradient(135deg, #1a5c4a, #0d3020)",
                            border: "1px solid #2a7a5a", borderRadius: 8,
                            padding: "10px 18px", color: loading ? "#2a5a40" : "#63cab7",
                            cursor: loading ? "not-allowed" : "pointer",
                            fontSize: 12, fontWeight: 700,
                            minWidth: 90,
                        }}>
                            {loading ? "⟳ يعمل..." : "▶ ابدأ"}
                        </button>
                    </div>

                    {loading && (
                        <div style={{
                            background: "rgba(99,202,183,0.06)", border: "1px solid #1a4a38",
                            borderRadius: 10, padding: 16, marginBottom: 20, fontSize: 12, color: "#3a8a70"
                        }}>
                            ⟳ يجمع بيانات المحافظ ويتتبع الأموال... قد يستغرق دقيقة بسبب حدود الـ API.
                        </div>
                    )}

                    {error && (
                        <div style={{
                            background: "rgba(220,50,50,0.08)", border: "1px solid rgba(220,50,50,0.3)",
                            borderRadius: 8, padding: 12, color: "#f08080", marginBottom: 16, fontSize: 12
                        }}>⚠ {error}</div>
                    )}

                    {summary && (
                        <>
                            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 20 }}>
                                {[
                                    { l: "إجمالي المشترين", v: summary.total, c: "#63cab7" },
                                    { l: "🔒 يحتفظون", v: summary.holders, c: "#50c878" },
                                    { l: "⚖ جزئي", v: summary.partial, c: "#dcb432" },
                                    { l: "💸 باعوا", v: summary.sold, c: "#dc5050" },
                                ].map(s => (
                                    <div key={s.l} style={{
                                        flex: 1, minWidth: 100,
                                        background: "rgba(255,255,255,0.03)", border: "1px solid #112018",
                                        borderRadius: 10, padding: "12px 14px", textAlign: "center"
                                    }}>
                                        <div style={{ fontSize: 22, fontWeight: 700, color: s.c }}>{s.v}</div>
                                        <div style={{ fontSize: 10, color: "#3a6a58", marginTop: 4 }}>{s.l}</div>
                                    </div>
                                ))}
                            </div>

                            <div style={{
                                background: "rgba(255,255,255,0.03)", border: "1px solid #112018",
                                borderRadius: 10, padding: "14px 18px", marginBottom: 20
                            }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                                    <span style={{ fontSize: 11, color: "#63cab7" }}>نسبة الاحتفاظ الإجمالية</span>
                                    <span style={{ fontSize: 14, fontWeight: 700, color: summary.holdRate > 60 ? "#50c878" : summary.holdRate > 30 ? "#dcb432" : "#dc5050" }}>
                                        {fmt(summary.holdRate)}%
                                    </span>
                                </div>
                                <Progress value={summary.holdRate} max={100}
                                    color={summary.holdRate > 60 ? "#50c878" : summary.holdRate > 30 ? "#dcb432" : "#dc5050"} />
                            </div>

                            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                                {[["wallets", "📊 المحافظ"], ["flow", "🌊 التدفق"]].map(([id, label]) => (
                                    <button key={id} onClick={() => setTab(id)} style={{
                                        background: tab === id ? "#1a5c4a" : "rgba(255,255,255,0.03)",
                                        border: `1px solid ${tab === id ? "#2a8a6a" : "#112018"}`,
                                        borderRadius: 8, padding: "8px 16px",
                                        color: tab === id ? "#63cab7" : "#3a6a58",
                                        cursor: "pointer", fontSize: 12,
                                    }}>{label}</button>
                                ))}
                            </div>

                            {tab === "wallets" && (
                                <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid #112018", borderRadius: 12, overflowX: "auto" }}>
                                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, textAlign: "right" }}>
                                        <thead>
                                            <tr style={{ background: "rgba(99,202,183,0.05)" }}>
                                                {["المحفظة", "استلم", "باع", "الاحتفاظ", "الحالة"].map(h => (
                                                    <th key={h} style={{ padding: "10px 12px", color: "#2a6a58" }}>{h}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {wallets.slice(0, 50).map((w, i) => (
                                                <tr key={w.address} style={{ borderBottom: "1px solid #0a1410" }}>
                                                    <td style={{ padding: "8px 12px" }}>
                                                        <a href={`https://bscscan.com/address/${w.address}`} target="_blank" style={{ color: "#3a8a72", textDecoration: "none" }}>
                                                            {fmtAddr(w.address)}
                                                        </a>
                                                    </td>
                                                    <td style={{ padding: "8px 12px", color: "#63cab7" }}>{fmt(w.received, 0)}</td>
                                                    <td style={{ padding: "8px 12px", color: "#dc7050" }}>{fmt(w.sent, 0)}</td>
                                                    <td style={{ padding: "8px 12px", width: 100 }}>
                                                        <Progress value={Math.max(0, w.holdPct)} max={100} color={w.holdPct > 60 ? "#50c878" : "#dc5050"} />
                                                    </td>
                                                    <td style={{ padding: "8px 12px" }}>
                                                        <Badge color={statusColor[w.status]}>{statusLabel[w.status]}</Badge>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {tab === "flow" && (
                                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                    {flowData.map((w, i) => (
                                        <div key={w.address} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid #112018", borderRadius: 10, padding: "12px 16px" }}>
                                            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                                                <span style={{ color: "#3a8a72", fontSize: 12 }}>{fmtAddr(w.address)}</span>
                                                <Badge color={statusColor[w.status]}>{statusLabel[w.status]}</Badge>
                                            </div>
                                            <div style={{ display: "flex", gap: 4 }}>
                                                <div style={{ flex: w.received, background: "rgba(99,202,183,0.2)", height: 15, borderRadius: 4 }}></div>
                                                {w.sent > 0 && <div style={{ flex: w.sent, background: "rgba(220,80,80,0.2)", height: 15, borderRadius: 4 }}></div>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </>
                    )}

                    {!loading && !summary && (
                        <div style={{ textAlign: "center", padding: "50px 20px", color: "#1a3a30" }}>
                            <div style={{ fontSize: 36, marginBottom: 14 }}>🔎</div>
                            <div style={{ fontSize: 13, color: "#2a5a48" }}>أدخل BscScan API Key للبدء في تتبع حركة السيولة</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
